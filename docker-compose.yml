name: grpc-sample

services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - laravel-app
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./laravel:/var/www/html
      - ./.env:/var/www/html/.env:ro
      - ./laravel/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - backend

  laravel-app:
    build:
      context: ./laravel
      dockerfile: Dockerfile
    working_dir: /var/www/html
    env_file:
      - ./.env
    volumes:
      - ./laravel:/var/www/html
      - ./.env:/var/www/html/.env:ro
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - grpc-user-service
    command: php-fpm
    ports:
      - "${PHP_FPM_PORT}:9000"
    networks:
      - backend

  grpc-user-service:
    build:
      context: ./grpc-user-service
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - ./grpc-user-service:/app
      - ./contracts:/contracts
    environment:
      PORT: ${GRPC_USER_SERVICE_PORT}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_DATABASE}
      DB_USER: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      RABBITMQ_URL: ${RABBITMQ_URL}
    depends_on:
      - postgres
      - redis
      - rabbitmq
    ports:
      - "${GRPC_USER_SERVICE_PORT}:${GRPC_USER_SERVICE_PORT}"
      - "${GRPC_METRICS_PORT}:${GRPC_METRICS_PORT}"
    networks:
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${POSTGRES_EXPOSE_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_EXPOSE_PORT}:6379"
    volumes:
      - redis_data:/data
    networks:
      - backend

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"
    networks:
      - backend

  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - "${JAEGER_UI_PORT}:16686"
      - "${OTEL_GRPC_PORT}:4317"
      - "${OTEL_HTTP_PORT}:4318"
    networks:
      - backend

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - backend

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - backend

volumes:
  postgres_data:
  redis_data:
  grafana_data:

networks:
  backend:
    driver: bridge